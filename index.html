<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingeniería Industrial</title>

<style>
body {margin:0; font-family:Arial; background:#0f172a; color:white; display:flex;}

.sidebar {width:280px; background:#020617; padding:20px;}

.sidebar h2 {color:#38bdf8;}

.sidebar button {
width:100%;
padding:10px;
margin:5px 0;
background:#1e293b;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover {background:#38bdf8;}

.content {flex:1; padding:30px;}

.card {
background:#1e293b;
padding:15px;
border-radius:10px;
margin:10px 0;
}

.card h3 {color:#38bdf8;}

.card p {color:#cbd5e1; line-height:1.5;}

a {
display:inline-block;
margin-top:10px;
padding:10px;
background:#38bdf8;
color:black;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🏭 Ingeniería Industrial</h2>

<button onclick="cargar('sem1')">Sem 1</button>
<button onclick="cargar('sem2')">Sem 2</button>
<button onclick="cargar('sem3')">Sem 3</button>
<button onclick="cargar('sem4')">Sem 4</button>
<button onclick="cargar('sem5')">Sem 5</button>
<button onclick="cargar('sem6')">Sem 6</button>
<button onclick="cargar('sem7')">Sem 7</button>
<button onclick="cargar('sem8')">Sem 8</button>

</div>

<div class="content" id="contenido">
<h1>Bienvenido</h1>
<p>Selecciona un semestre</p>
</div>

return `
<div class="card">
<h3>${t}</h3>
<p>${d}</p>
<a href="${link}">Entrar →</a>
</div>`;
}
